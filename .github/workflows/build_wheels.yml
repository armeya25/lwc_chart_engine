name: CI/CD Build Wheels

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install UI Dependencies
        run: |
          cd src
          npm install
          cd ..

      - name: Build Frontend
        shell: bash
        run: |
          cd src
          npm run build:frontend
          cd ..

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Maturin
        run: pip install maturin

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev upx-ucl

      - name: Install UPX (macOS)
        if: runner.os == 'macOS'
        run: brew install upx

      - name: Install UPX (Windows)
        if: runner.os == 'Windows'
        run: choco install upx

      - name: Build Standalone Binary
        run: cargo build --release --manifest-path src/src-tauri/Cargo.toml --features python-bridge

      - name: Prepare Python Package
        shell: bash
        run: |
          mkdir -p src/chart_engine
          if [ "${{ runner.os }}" == "Windows" ]; then
            cp src/src-tauri/target/release/chart_engine_lib.exe src/chart_engine/chart_engine.exe
            upx --best --lzma src/chart_engine/chart_engine.exe || true
          else
            cp src/src-tauri/target/release/chart_engine_lib src/chart_engine/chart_engine
            upx --best --lzma src/chart_engine/chart_engine || true
          fi

      - name: Build Wheel
        run: maturin build --release --features python-bridge --out dist --manylinux off

      - name: Compress Internal Library (UPX)
        shell: bash
        run: |
          # Re-compressing the internal .so/.pyd files inside the wheel
          WHEEL_FILE=$(ls dist/*.whl | head -n 1)
          if [ -n "$WHEEL_FILE" ]; then
            echo "📦 Unpacking $WHEEL_FILE for high compression..."
            mkdir tmp_wheel
            unzip -q "$WHEEL_FILE" -d tmp_wheel
            
            # Find and compress shared libraries
            find tmp_wheel -type f \( -name "*.so" -o -name "*.pyd" \) -exec upx --best --lzma {} + || true
            
            # Update RECORD file (Python one-liner to fix checksums and sizes)
            python -c "
          import os, hashlib, base64
          record_path = next(iter(path for path in [os.path.join(r, 'RECORD') for r, d, f in os.walk('tmp_wheel')] if os.path.exists(path)), None)
          if record_path:
              lines = []
              with open(record_path, 'r') as f:
                  for line in f:
                      parts = line.strip().split(',')
                      if len(parts) >= 3:
                          rel_path = parts[0]
                          full_path = os.path.join('tmp_wheel', rel_path)
                          if os.path.exists(full_path) and not rel_path.endswith('RECORD'):
                              size = os.path.getsize(full_path)
                              with open(full_path, 'rb') as bf:
                                  sha = base64.urlsafe_b64encode(hashlib.sha256(bf.read()).digest()).decode().rstrip('=')
                              parts[1] = f'sha256={sha}'
                              parts[2] = str(size)
                      lines.append(','.join(parts))
              with open(record_path, 'w') as f:
                  f.write('\n'.join(lines) + '\n')
          "
            # Repackage the wheel
            WHEEL_NAME=$(basename "$WHEEL_FILE")
            cd tmp_wheel && zip -q -9 -r "../$WHEEL_FILE" . && cd ..
            rm -rf tmp_wheel

            # Rename with OS suffix
            OS_SUFFIX=$(echo "${{ runner.os }}" | tr '[:upper:]' '[:lower:]')
            NEW_WHEEL_NAME="${WHEEL_NAME%.whl}-${OS_SUFFIX}.whl"
            mv "dist/$WHEEL_NAME" "dist/$NEW_WHEEL_NAME"
            echo "✅ Renamed $WHEEL_NAME to $NEW_WHEEL_NAME"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  commit_wheels:
    name: Commit Wheels back to Repo
    needs: build_wheels
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: wheels
          pattern: wheels-*
          merge-multiple: true

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p wheels
          git add wheels/*.whl
          git commit -m "🚀 build: automated wheel generation for v0.3.0" || echo "No changes to commit"
          git push
