name: CI/CD Build & Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "wheels/**"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install UI Dependencies
        run: |
          cd src
          npm install
          cd ..

      - name: Build Frontend
        shell: bash
        run: |
          cd src
          npm run build:frontend
          cd ..

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Maturin
        run: pip install maturin

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev upx-ucl

      - name: Install UPX (macOS)
        if: runner.os == 'macOS'
        run: brew install upx

      - name: Install UPX (Windows)
        if: runner.os == 'Windows'
        run: choco install upx

      - name: Build Standalone Binary
        run: cargo build --release --manifest-path src/src-tauri/Cargo.toml

      - name: Prepare Python Package
        shell: bash
        run: |
          mkdir -p src/chart_engine
          if [ "${{ runner.os }}" == "Windows" ]; then
            cp src/src-tauri/target/release/chart_engine.exe src/chart_engine/chart_engine.exe
            upx --best --lzma src/chart_engine/chart_engine.exe || true
          else
            cp src/src-tauri/target/release/chart_engine src/chart_engine/chart_engine
            upx --best --lzma src/chart_engine/chart_engine || true
          fi

      - name: Build Wheel
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "Linux" ]; then
            maturin build --release --features python-bridge --out wheels --compatibility manylinux_2_39
          else
            maturin build --release --features python-bridge --out wheels
          fi

      - name: Verify Wheel Structure
        shell: bash
        run: |
          WHEEL_FILE=$(ls wheels/*.whl | head -n 1)
          echo "🔍 Auditing $WHEEL_FILE..."
          python -m zipfile -l "$WHEEL_FILE" | grep "chart_engine/chart.py" || (echo "❌ Error: Python files missing from wheel!" && exit 1)
          python -m zipfile -l "$WHEEL_FILE" | grep "chart_engine_lib" || (echo "❌ Error: Rust extension missing from wheel!" && exit 1)

      - name: Compress Internal Library (UPX)
        shell: bash
        run: |
          WHEEL_FILE=$(ls wheels/*.whl | head -n 1)
          if [ -n "$WHEEL_FILE" ]; then
            echo "📦 Unpacking $WHEEL_FILE for high compression..."
            mkdir tmp_wheel
            python -m zipfile -e "$WHEEL_FILE" tmp_wheel
            
            # Dynamically identify the package directory
            PKG_DIR=$(find tmp_wheel -maxdepth 1 -type d ! -name ".*" ! -name "*.dist-info" ! -name "*.data" ! -name "tmp_wheel" | head -n 1)
            PKG_NAME=$(basename "$PKG_DIR")
            echo "✅ Detected package: $PKG_NAME"

            # Restoring executable permissions before compression
            find tmp_wheel -type f \( -name "*.so" -o -name "*.pyd" -o -name "chart_engine" -o -name "chart_engine.exe" \) -exec chmod +x {} +
            
            # Find and compress only the main binary (skip .so/.pyd for stability and tracebacks)
            find tmp_wheel -type f \( -name "chart_engine" -o -name "chart_engine.exe" \) -exec upx --best --lzma --force {} + || true
            
            # Update RECORD file (Python logic)
            python3 -c "
          import os, hashlib, base64
          record_path = next(iter(path for path in [os.path.join(r, 'RECORD') for r, d, f in os.walk('tmp_wheel')] if os.path.exists(path)), None)
          if record_path:
              lines = []
              with open(record_path, 'r') as f:
                  for line in f:
                      parts = line.strip().split(',')
                      if len(parts) >= 3:
                          rel_path = parts[0]
                          full_path = os.path.join('tmp_wheel', rel_path)
                          if os.path.exists(full_path) and not rel_path.endswith('RECORD'):
                              size = os.path.getsize(full_path)
                              with open(full_path, 'rb') as bf:
                                  sha = base64.urlsafe_b64encode(hashlib.sha256(bf.read()).digest()).decode().rstrip('=')
                              parts[1] = f'sha256={sha}'
                              parts[2] = str(size)
                      lines.append(','.join(parts))
              with open(record_path, 'w') as f:
                  f.write('\n'.join(lines) + '\n')
            "
            
            # Repack the highly-compressed wheel
            python3 -c "
          import zipfile, os
          with zipfile.ZipFile('$WHEEL_FILE.new', 'w', zipfile.ZIP_DEFLATED, compresslevel=9) as zf:
              for root, dirs, files in os.walk('tmp_wheel'):
                  for file in files:
                      full_path = os.path.join(root, file)
                      rel_path = os.path.relpath(full_path, 'tmp_wheel')
                      st = os.stat(full_path)
                      zinfo = zipfile.ZipInfo.from_file(full_path, rel_path)
                      zinfo.external_attr = (st.st_mode & 0xFFFF) << 16
                      with open(full_path, 'rb') as f:
                          zf.writestr(zinfo, f.read(), compress_type=zipfile.ZIP_DEFLATED)
            "
            mv "$WHEEL_FILE.new" "$WHEEL_FILE"
            rm -rf tmp_wheel
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheels/*.whl

  commit_wheels:
    name: Commit Wheels back to Repo
    needs: build_wheels
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clear Old Wheels
        run: |
          git rm -f wheels/*.whl || true
          mkdir -p wheels

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: wheels
          pattern: wheels-*
          merge-multiple: true

      - name: Get Version
        id: get_version
        shell: bash
        run: |
          VERSION=$(grep -m 1 "^version =" pyproject.toml | cut -d '"' -f 2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p wheels
          git add -f wheels/*.whl
          git commit -m "🚀 build: automated wheel generation for v${{ steps.get_version.outputs.VERSION }} *maintained by amit vaidya*" || echo "No changes to commit"
          # Pull and rebase to ensure we are on top of the latest main
          git pull origin main --rebase
          git push origin HEAD:main

  publish_pypi:
    name: Publish to PyPI
    needs: build_wheels
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/chart-engine
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: wheels
          pattern: wheels-*
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R wheels

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: wheels/
          skip-existing: true
          verbose: true

  cleanup_repo:
    name: Repository Hygiene (Cleanup Wheels)
    needs: publish_pypi
    if: success() && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Remove Wheels from Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git rm -rf wheels/ || echo "Wheels folder not found"
          git rm -rf dist/ || echo "Dist folder not found"
          git commit -m "🧹 cleanup: remove binaries after successful PyPI release *maintained by amit vaidya*" || echo "No changes to commit"
          # Ensure we have the latest main
          git pull origin main --rebase
          git push origin main
